<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adriano Karaokê - Profissional</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuzzysort@2.0.4/fuzzysort.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #0B0A12; color: #FFFFFF; min-height: 100vh; padding-bottom: 80px; }
        .app-container { width: 100%; max-width: 450px; margin: auto; display: flex; flex-direction: column; }
        .banner-topo { width: 100%; height: auto; border-bottom: 3px solid #161426; }
        .contadores-container { display: flex; gap: 12px; padding: 15px; }
        .card-contador { flex: 1; background-color: #161426; border-radius: 12px; padding: 12px; text-align: center; }
        .pesquisa-container { padding: 0 15px 15px 15px; }
        .input-pesquisa { width: 100%; background-color: #161426; border: 2px solid #5A94CB; color: #FFFFFF; padding: 12px; border-radius: 25px; outline: none; }
        .lista-musicas { padding: 0 15px; display: flex; flex-direction: column; gap: 12px; }
        .card-musica { background-color: #161426; border-radius: 14px; padding: 12px; display: flex; align-items: center; justify-content: space-between; border-left: 5px solid #5A94CB; }
        .txt-musica { font-size: 15px; font-weight: 700; }
        .txt-cantor { font-size: 13px; color: #5A94CB; }
        .txt-codigo { font-size: 15px; color: #FF4D4D; font-weight: 700; }
        .menu-inferior { position: fixed; bottom: 0; width: 100%; max-width: 450px; background-color: #161426; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #333; }
        .menu-item { color: #8884A4; text-decoration: none; font-size: 12px; text-align: center; }
    </style>
</head>
<body>
    <div class="app-container">
        <img src="assets/banner.jpg" alt="Banner" class="banner-topo">
        <div class="contadores-container">
            <div class="card-contador">Músicas: <span id="count-total">0</span></div>
        </div>
        <div class="pesquisa-container">
            <input type="text" id="input-pesquisa" class="input-pesquisa" placeholder="Pesquisar (aceita erros de digitação)..." oninput="realizarBusca()">
        </div>
        <div class="lista-musicas" id="container-musicas"></div>
        <nav class="menu-inferior">
            <a class="menu-item" href="/">Catálogo</a>
            <a class="menu-item" href="#">Favoritos</a>
            <a class="menu-item" href="#">Ferramentas</a>
        </nav>
    </div>

    <script>
        const db = new Dexie('KaraokeDB');
        db.version(1).stores({ musicas: '++id,titulo,cantor,codigo' });
        let listaCompleta = [];

        async function carregarDados() {
            listaCompleta = await db.musicas.toArray();
            if (listaCompleta.length > 0) renderizarLista(listaCompleta);

            try {
                const res = await fetch('/musicas');
                const nuvem = await res.json();
                await db.musicas.clear();
                await db.musicas.bulkPut(nuvem);
                listaCompleta = nuvem;
                renderizarLista(listaCompleta);
            } catch (e) { console.log("Usando modo offline"); }
        }

        function renderizarLista(lista) {
            const container = document.getElementById('container-musicas');
            container.innerHTML = '';
            document.getElementById('count-total').innerText = lista.length;
            lista.forEach(m => {
                const card = document.createElement('div');
                card.className = 'card-musica';
                card.innerHTML = `
                    <div>
                        <div class="txt-musica">${m.titulo || 'Sem Título'}</div>
                        <div class="txt-cantor">${m.cantor || 'Sem Artista'}</div>
                    </div>
                    <div class="txt-codigo">${String(m.codigo || 0).padStart(5, '0')}</div>`;
                container.appendChild(card);
            });
        }

        function realizarBusca() {
            const termo = document.getElementById('input-pesquisa').value;
            if (!termo) { renderizarLista(listaCompleta); return; }
            
            // Lógica da Busca Inteligente (Fuzzy Search)
            const resultados = fuzzysort.go(termo, listaCompleta, { keys: ['titulo', 'cantor', 'codigo'] });
            renderizarLista(resultados.map(r => r.obj));
        }

        window.onload = carregarDados;
    </script>
</body>
</html>
